name: gb-core-sgen

services:
  core-sourcegen:
    build:
      context: ../..
      dockerfile: Dockerfile.unit
      args:
        TEST_GROUP: CORE_UNIT
        TEST_FOLDER: "./test/dymaptic.GeoBlazor.Core.SourceGenerator.Tests"
        TEST_PROJECT: "./test/dymaptic.GeoBlazor.Core.SourceGenerator.Tests/dymaptic.GeoBlazor.Core.SourceGenerator.Tests.csproj"
        FILTER: ${FILTER}
    stop_grace_period: 30s
    environment:
      - COVER=${COVER:-false}
      - COVERAGE_FORMAT="${COVERAGE_FORMAT:-xml}"
      - SESSION_ID="CORE_SOURCEGEN"
      - CONTAINER_CHECK=${CONTAINER_CHECK:-false}
    volumes:
      - ./unit-coverage:/unit-coverage