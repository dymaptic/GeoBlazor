name: geoblazor-core-tests

services:
  test-app:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        ARCGIS_API_KEY: ${ARCGIS_API_KEY}
        GEOBLAZOR_LICENSE_KEY: ${GEOBLAZOR_CORE_LICENSE_KEY}
        HTTP_PORT: ${HTTP_PORT}
        HTTPS_PORT: ${HTTPS_PORT}
        WFS_SERVERS: |-
          "WFSServers": [
            {
              "Url": "https://dservices1.arcgis.com/ESMARspQHYMw9BZ9/arcgis/services/Counties_May_2023_Boundaries_EN_BUC/WFSServer",
              "OutputFormat": "GEOJSON"
            },
            {
              "Url": "https://geobretagne.fr/geoserver/ows",
              "OutputFormat": "json"
            }
          ]
    stop_grace_period: 30s
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - COVERAGE_ENABLED=${COVERAGE_ENABLED:-false}
      - COVERAGE_FORMAT=${COVERAGE_FORMAT:-xml}
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
      - "${HTTPS_PORT:-9443}:${HTTPS_PORT:-9443}"
    volumes:
      - ./coverage:/coverage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://localhost:${HTTPS_PORT:-9443} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
