name: gb-pro-unit

services:
  pro-unit:
    build:
      context: ../../..
      dockerfile: Dockerfile.unit
      args:
        TEST_GROUP: PRO_UNIT
        TEST_FOLDER: "./test/dymaptic.GeoBlazor.Pro.Test.Unit"
        TEST_PROJECT: "./test/dymaptic.GeoBlazor.Pro.Test.Unit/dymaptic.GeoBlazor.Pro.Test.Unit.csproj"
        FILTER: ${FILTER}
    stop_grace_period: 30s
    environment:
      - COVER=${COVER:-false}
      - COVERAGE_FORMAT="${COVERAGE_FORMAT:-xml}"
      - SESSION_ID="PRO_UNIT"
      - CONTAINER_CHECK=${CONTAINER_CHECK:-false}
    volumes:
      - ./unit-coverage:/unit-coverage